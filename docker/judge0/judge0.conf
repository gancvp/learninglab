################################################################################
# Judge0 configuration for local development in AI Learning Lab.
# These values are intentionally explicit so the integration is easy to trace.
# If you harden this later, start by rotating passwords and adding auth tokens.
################################################################################

JUDGE0_TELEMETRY_ENABLE=false
ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=false
ENABLE_COMMAND_LINE_ARGUMENTS=true
ENABLE_BATCHED_SUBMISSIONS=true
ENABLE_CALLBACKS=false
ENABLE_ADDITIONAL_FILES=false
USE_DOCS_AS_HOMEPAGE=true

INTERVAL=0.2
COUNT=2
MAX_QUEUE_SIZE=100

REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0_redis_password_change_me

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_postgres_password_change_me

ALLOW_ENABLE_NETWORK=false
ENABLE_NETWORK=false
CPU_TIME_LIMIT=2
MAX_CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=5
MAX_WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
MAX_MEMORY_LIMIT=256000

RAILS_ENV=production
RAILS_SERVER_PROCESSES=2
